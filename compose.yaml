services:
  api:
    build:
      context: .
    image: openscheduleapi:latest
    container_name: open_schedule_api
    restart: unless-stopped
    ports:
      - ${OSA_SERVER_PORT}:${OSA_SERVER_PORT}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TZ=UTC
      - OSA_DB_HOST=db
      - OSA_DB_PORT=3306
      - OSA_DB_NAME=osadb

  db:
    image: mysql:8.0
    container_name: osa_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=osadb
      - MYSQL_USER=${OSA_DB_USER}
      - MYSQL_PASSWORD=${OSA_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
